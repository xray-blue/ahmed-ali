        .avatar-box { width: 120px; height: 120px; margin: -60px auto 15px; position: relative; }

        .full { grid-column: span 2; }
        .fb { background: #1877F2; } .wa { background: #25D366; } .tg { background: #0088cc; } .ig { background: #E1306C; } .link { background: #333; }
